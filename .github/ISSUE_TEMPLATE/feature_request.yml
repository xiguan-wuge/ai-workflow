name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you think this should work.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there other approaches or workarounds you've tried?
