name: Stale

on:
  schedule:
    - cron: '37 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: |
            This issue has been automatically marked as stale due to 60 days of inactivity. It will be closed in 14 days if no further activity occurs. Feel free to comment to keep it open.
          stale-pr-message: |
            This PR has been automatically marked as stale due to 60 days of inactivity. It will be closed in 14 days if no further activity occurs. Feel free to comment or push changes to keep it open.
          close-issue-message: 'This issue was closed due to 14 days of inactivity after being marked as stale.'
          close-pr-message: 'This PR was closed due to 14 days of inactivity after being marked as stale.'
          exempt-issue-labels: 'pinned,security,keep'
          exempt-pr-labels: 'pinned,security,keep,in-progress'
          operations-per-run: 30
