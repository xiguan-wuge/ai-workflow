name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate release files
        id: release
        run: pnpm release:ci

      - name: Stop when no packages changed
        if: steps.release.outputs.changed != 'true'
        run: echo "No package changes found. Skipping release."

      - name: Build packages
        if: steps.release.outputs.changed == 'true'
        run: pnpm build

      - name: Build documentation
        if: steps.release.outputs.changed == 'true'
        run: pnpm docs:build

      - name: Commit release files
        if: steps.release.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json packages/*/CHANGELOG.md
          git commit -m "chore(release): publish packages"

      - name: Create package tags
        if: steps.release.outputs.changed == 'true'
        run: |
          node -e "const manifest = require('./.release-manifest.json'); for (const release of manifest.releases) { require('child_process').execFileSync('git', ['tag', release.tag], { stdio: 'inherit' }); }"

      - name: Push release commit and tags
        if: steps.release.outputs.changed == 'true'
        run: git push origin HEAD:${GITHUB_REF_NAME} --follow-tags

      - name: Validate npm token format
        if: steps.release.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is empty or missing."
            exit 1
          fi

          if printf '%s' "$NODE_AUTH_TOKEN" | grep -q '[[:space:]]'; then
            echo "NPM_TOKEN contains whitespace characters."
            exit 1
          fi

          case "$NODE_AUTH_TOKEN" in
            npm_*) echo "NPM token format looks valid." ;;
            *) echo "NPM_TOKEN does not look like an npm access token (expected prefix: npm_)." ; exit 1 ;;
          esac

      - name: Configure npm auth
        if: steps.release.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cat > ~/.npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF

      - name: Publish changed packages to npm
        if: steps.release.outputs.changed == 'true'
        run: |
          node - <<'NODE'
          const { execFileSync } = require('child_process')
          const manifest = require('./.release-manifest.json')

          for (const release of manifest.releases) {
            execFileSync('pnpm', ['--filter', release.name, 'publish', '--access', 'public', '--no-git-checks'], {
              stdio: 'inherit',
              env: process.env
            })
          }
          NODE
